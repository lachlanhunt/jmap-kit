name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [22.x, 24.x, 25.x]

        steps:
            - uses: actions/checkout@v4

            # Corepack was removed from Node 25+. Installing it via npm ensures
            # it's available across all Node versions in the matrix.
            - name: Enable Corepack
              run: npm install -g corepack && corepack enable

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: yarn

            - name: Install dependencies
              run: yarn install --immutable

            - name: Format check
              run: yarn format:check

            - name: Lint
              run: yarn lint

            - name: Type check
              run: yarn typecheck

            - name: Test
              run: yarn test --run

            - name: Build
              run: yarn build
